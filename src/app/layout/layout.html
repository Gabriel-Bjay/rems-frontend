<div class="shell">
    <header class="topbar">
        <span class="brand">PRMS</span>
        <span class="spacer"></span>
        <span class="user-email"> {{user()?.email}} </span>
        <span class="user-email"> {{user()?.fname}} </span>
        <dx-button text="Logout" (onClick)="onLogout()"></dx-button>
    </header>

    <div class="body">
        <nav class="sidenav">
            <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
            <a routerLink="/owners" routerLinkActive="active">Owners</a>
            <a routerLink="/properties" routerLinkActive="active">Properties</a>
            <a routerLink="/units" routerLinkActive="active">Units</a>
            <a routerLink="/agents" routerLinkActive="active">Agents</a>
        </nav>

        <main class="content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
