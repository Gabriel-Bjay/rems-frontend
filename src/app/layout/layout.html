<div class="shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="logo">R</div>
            <div>
                <div class="b-name">REMS</div>
                <div class="b-sub">Rental Management</div>
            </div>
        </div>

        <div class="nav-label">Main</div>
        <nav class="nav">
            @for (item of nav(); track item.route) {
                <a [routerLink]="item.route" routerLinkActive="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path [attr.d]="item.icon" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    {{ item.label }}
                </a>
            }
        </nav>

        <div class="spacer"></div>

        <div class="userbox">
            <div class="avatar">{{ initials() }}</div>
            <div class="info">
                <div class="u-name">{{ user()?.name }}</div>
                <div class="u-role">{{ role() }}</div>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div class="t-spacer"></div>
            <dx-button text="Logout" stylingMode="text" (onClick)="onLogout()"></dx-button>
        </header>
        <main class="content-area">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
