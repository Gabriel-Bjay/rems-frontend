<div class="shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="logo">PR</div>
            <div>
                <div class="b-name">PRMS</div>
                <div class="b-sub">Property Rental Management System</div>
            </div>
        </div>

        <div class="nav-label">Main</div>
        <nav class="nav">
            <a routerLink="/dashboard" routerLinkActive="active">
                <svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg> Dashboard
            </a>
            <a routerLink="/owners" routerLinkActive="active">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg> Owners
            </a>
            <a routerLink="/properties" routerLinkActive="active">
                <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M9 8h2M13 8h2M9 12h2M13 12h2M9 16h2M13 16h2"/></svg> Properties
            </a>
            <a routerLink="/units" routerLinkActive="active">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Units
            </a>
            <a routerLink="/agents" routerLinkActive="active">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg> Agents
            </a>
            <a routerLink="/tenants" routerLinkActive="active">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 2.7-5.5 7-5.5s7 2.2 7 5.5"/><path d="M17 5.5a3 3 0 0 1 0 5.8M22 20c0-2.6-1.4-4.4-4-5.1"/></svg> Tenants
            </a>
        </nav>

        <div class="spacer"></div>
        <div class="userbox">
            <div class="avatar">{{ initials() }}</div>
            <div class="info">
                <div class="u-mail">{{ user()?.email }}</div>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div class="t-spacer"></div>
            <dx-button text="Logout" stylingMode="text" (onClick)="onLogout()"></dx-button>
        </header>
        <main class="content-area">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
