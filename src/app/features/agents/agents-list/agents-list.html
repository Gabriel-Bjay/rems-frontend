<div class="page">
    <h1>Agents</h1>

    <dx-data-grid
        [dataSource]="dataSource"
        [showBorders]="true"
        [columnAutoWidth]="true">

        <dxo-editing
            mode="popup"
            [allowAdding]="true"
            [allowUpdating]="true"
            [allowDeleting]="true">
        </dxo-editing>

        <dxi-column dataField="fname" caption="First name">
            <dxi-validation-rule type="required"></dxi-validation-rule>
        </dxi-column>

        <dxi-column dataField="lname" caption="Last name">
            <dxi-validation-rule type="required"></dxi-validation-rule>
        </dxi-column>

        <dxi-column dataField="email" caption="Email">
            <dxi-validation-rule type="required"></dxi-validation-rule>
            <dxi-validation-rule type="email"></dxi-validation-rule>
        </dxi-column>

        <dxi-column dataField="phone" caption="Phone"></dxi-column>

        <dxi-column dataField="commission_rate" caption="Commission rate (%)" dataType="number"></dxi-column>
    </dx-data-grid>
</div>
